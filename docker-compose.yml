services:
  postgres:
    image: postgres:17-alpine
    container_name: crikket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-crikket}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-trust}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crikket}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rustfs_perms:
    image: alpine
    user: root
    volumes:
      - rustfs_data:/data
    command: chown -R 10001:10001 /data
    restart: "no"

  rustfs:
    image: rustfs/rustfs:latest
    container_name: crikket-rustfs
    restart: unless-stopped
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_REGION: auto
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  server:
    image: ghcr.io/redpangilinan/crikket-server:latest
    pull_policy: always
    container_name: crikket-server
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rustfs:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${SERVER_PORT:-3000}:3000"
      - "${WEB_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    image: ghcr.io/redpangilinan/crikket-server:latest
    pull_policy: always
    restart: "no"
    env_file:
      - ./apps/server/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
    command: ["bun", "run", "--filter", "@crikket/db", "db:migrate"]

  web:
    image: ghcr.io/redpangilinan/crikket-web:latest
    pull_policy: always
    container_name: crikket-web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    depends_on:
      server:
        condition: service_healthy
    network_mode: "service:server"
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3001').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  rustfs_data:
